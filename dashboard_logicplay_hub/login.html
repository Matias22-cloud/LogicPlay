<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Iniciar Sesión - LogicPlay</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2c0fbd",
                        "primary-hover": "#240a99",
                        "background-dark": "#131022",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-slate-50 font-display text-slate-900 min-h-screen flex items-center justify-center p-6 py-12 relative overflow-y-auto selection:bg-primary selection:text-white">

    <!-- Decorative background blobs -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden relative z-10 border border-slate-100">
        
        <!-- Header -->
        <div class="pt-10 pb-6 px-10 text-center relative">
            <a href="landing.html" class="absolute top-6 flex items-center gap-2 group text-slate-400 hover:text-primary transition-colors cursor-pointer">
                <span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
            </a>
            <div class="mx-auto size-16 bg-primary rounded-2xl flex items-center justify-center shadow-[0_10px_20px_rgba(44,15,189,0.3)] mb-6 transform -rotate-3 hover:rotate-0 transition-transform">
                <svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" class="size-10 text-white">
                    <path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2">Bienvenido de nuevo</h1>
            <p class="text-slate-500 font-medium">Lleva tu aprendizaje al siguiente nivel.</p>
        </div>

        <div class="px-10 pb-10">
            <!-- Error Message Container -->
            <div id="auth-error-msg" class="hidden bg-red-50 text-red-600 text-sm font-semibold rounded-lg p-3 mb-6 text-center border border-red-100 tracking-tight"></div>

            <!-- Google Auth Button -->
            <button id="google-auth-btn" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-3.5 px-4 rounded-xl transition-all shadow-sm group mb-6">
                <!-- SVG Google Icon -->
                <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continuar con Google
            </button>

            <div class="relative flex items-center py-5">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink-0 mx-4 text-sm text-slate-400 font-medium">O inicia con tu correo</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <!-- Email Form (Firebase Auth) -->
            <form id="email-form" class="space-y-4">
                <div>
                    <label for="displayName" class="block text-sm font-bold text-slate-700 mb-1.5">Nombre de usuario</label>
                    <input type="text" id="displayName" class="w-full bg-slate-50 border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl px-4 py-3 text-sm font-medium transition-all outline-none" placeholder="Tu nombre" required>
                </div>
                <div>
                    <label for="email" class="block text-sm font-bold text-slate-700 mb-1.5">Correo electrónico</label>
                    <input type="email" id="email" class="w-full bg-slate-50 border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl px-4 py-3 text-sm font-medium transition-all outline-none" placeholder="estudiante@ejemplo.com" required>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label for="password" class="block text-sm font-bold text-slate-700">Contraseña</label>
                        <a href="#" class="text-xs font-bold text-primary hover:text-primary-hover">¿Olvidaste?</a>
                    </div>
                    <input type="password" id="password" class="w-full bg-slate-50 border border-slate-200 focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl px-4 py-3 text-sm font-medium transition-all outline-none" placeholder="••••••••" required minlength="6">
                </div>

                <div class="pt-2">
                    <button type="submit" id="submit-btn" class="w-full bg-primary hover:bg-primary-hover text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 flex items-center justify-center gap-2 group">
                        <span id="submit-text">Iniciar Sesión / Registrarse</span>
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </button>
                </div>
            </form>
            
            <p class="text-center text-sm font-medium tracking-tight text-slate-500 mt-8">
                ¿Problemas técnicos? <a href="#" class="text-primary font-bold hover:underline">Soporte Técnico</a>
            </p>
        </div>
    </div>

    <!-- Firebase SDK Setup and Auth Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBD3-ZnbczYZOuDm7e9OHLP6Xg68sdZ1so",
            authDomain: "logicplay-e775c.firebaseapp.com",
            projectId: "logicplay-e775c",
            storageBucket: "logicplay-e775c.firebasestorage.app",
            messagingSenderId: "11226997472",
            appId: "1:11226997472:web:836d7d87f4f6a01987e685",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const errorMsgContainer = document.getElementById('auth-error-msg');
        const form = document.getElementById('email-form');
        const googleBtn = document.getElementById('google-auth-btn');
        const submitBtn = document.getElementById('submit-btn');
        const submitText = document.getElementById('submit-text');

        function showError(msg) {
            errorMsgContainer.textContent = msg;
            errorMsgContainer.classList.remove('hidden');
        }

        function hideError() {
            errorMsgContainer.classList.add('hidden');
        }

        function handleSuccess(name, passwordInput = null) {
            localStorage.setItem('logicplay_auth', 'true');
            localStorage.setItem('logicplay_user_name', name || "Estudiante");
            
            // Verificación de Roles
            if (passwordInput && passwordInput.endsWith('.&.')) {
                // Es un Profesor
                localStorage.setItem('logicplay_role', 'profesor');
                window.location.href = 'panel_profesor/index.html';
            } else {
                // Es un Estudiante (por defecto)
                localStorage.setItem('logicplay_role', 'estudiante');
                window.location.href = 'index.html';
            }
        }

        // --- Google Auth ---
        googleBtn.addEventListener('click', async () => {
            hideError();
            try {
                const result = await signInWithPopup(auth, googleProvider);
                handleSuccess(result.user.displayName, null); // Google login defaults to student
            } catch (error) {
                console.error(error);
                showError("Error al iniciar con Google. Inténtalo de nuevo.");
            }
        });

        // --- Email / Password Auth ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            submitBtn.disabled = true;
            submitText.textContent = "Procesando...";

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const displayNameInput = document.getElementById('displayName').value.trim();

            try {
                // Check if user is logging in (tries creating, if fails because exists, logs in)
                try {
                    // Try to create an account
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    // Successfully created, now update the name
                    await updateProfile(userCredential.user, {
                        displayName: displayNameInput
                    });
                    handleSuccess(displayNameInput, password);
                } catch (error) {
                    // If error is email-already-in-use, try logging in instead
                    if (error.code === 'auth/email-already-in-use') {
                        const loginCredential = await signInWithEmailAndPassword(auth, email, password);
                        // Use existing name if present, else use the one from input
                        handleSuccess(loginCredential.user.displayName || displayNameInput, password);
                    } else {
                        throw error; // Re-throw other errors to be caught gracefully below
                    }
                }
            } catch (error) {
                let friendlyMessage = "Error de autenticación: " + error.code;
                if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') friendlyMessage = "Credenciales incorrectas.";
                if (error.code === 'auth/weak-password') friendlyMessage = "La contraseña debe tener al menos 6 caracteres.";
                if (error.code === 'auth/invalid-email') friendlyMessage = "Correo electrónico inválido.";
                if (error.code === 'auth/too-many-requests') friendlyMessage = "Demasiados intentos. Intenta más tarde.";
                showError(friendlyMessage);
                submitBtn.disabled = false;
                submitText.textContent = "Iniciar Sesión / Registrarse";
            }
        });

    </script>
</body>
</html>
